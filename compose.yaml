services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: ghcr.io/MKEnquiries/shortener:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: shortener
      DB_USER: shortener
      DB_PASSWORD: changeme
    ports:
      - "5000:5000"

volumes:
  pgdata:
